version: "3"

services:

  backend:
    build: ./backend
    container_name: grocery-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: grocery-frontend
    ports:
      - "3000:80"

  mongo:
    image: mongo
    container_name: grocery-mongo
    ports:
      - "27017:27017"